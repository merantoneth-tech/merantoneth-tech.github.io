<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mer Antoneth Gripo - Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    background-color: #d9d9d9;
  }

  /* Navbar */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #f2f2f2;
    padding: 20px 60px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.2rem;
  }

  .logo-dot {
    width: 20px;
    height: 20px;
    background-color: #f2a900;
    border-radius: 50%;
    display: inline-block;
  }

  .logo a {
    text-decoration: none;
    color: #333;

  }

  .nav-links {
    display: flex;
    gap: 25px;
    align-items: center;
  }

  .nav-links a {
    text-decoration: none;
    color: #333;
    font-size: 1rem;
  }

  .nav-links span {
    color: #ccc;
  }
   .active {
    font-weight: bold;
  }

  /* Hero Section */
  .hero {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    padding: 80px 60px;
    min-height: 80vh;
    flex-wrap: wrap;
  }

  .profile-img {
    width: 480px;
    height: 480px;
    border-radius: 50%;
    object-fit: cover;
  }

  .hero-text {
    max-width: 450px;
  }

  .hero-text h1 {
    font-family: 'Caveat', cursive;
    font-size: 5rem;
    color: #6b5b1f;
    margin-bottom: 10px;
  }

  .hero-text h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.5rem;
    margin-bottom: 20px;
    color: #1a1a1a;
  }

  .hero-text p {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.8;
    color: #1a1a1a;
    margin-bottom: 40px;
  }

  .buttons {
    display: flex;
    gap: 20px;
  }

  .btn-circle {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.2rem;
    color: #fff;
    text-decoration: none;
    text-align: center;
    transition: transform 0.2s ease;
    width: 150px;
    height: 150px;
  }

  .btn-circle:hover {
    transform: scale(1.05);
  }

  .resume-btn { background-color: #1a1a1a; }
  .projects-btn { background-color: #b8860b; }
  .contact-btn { background-color: #5c4a1a; }

  /* Footer / Contact info */
  .contact-info {
    background-color: #f2f2f2;
    padding: 40px 60px;
    display: flex;
    justify-content: space-between;
    gap: 100px;
    border-top: 1px solid #ddd;
  }

  .contact-info h3 {
    font-weight: 700;
    margin-bottom: 10px;
  }

  .contact-info a {
    color: #333;
    text-decoration: underline;
  }

  .social-icons {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .social-icons a {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background-color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    flex-shrink: 0;
  }

  @media (max-width: 900px) {
    .hero {
      flex-direction: column;
      text-align: center;
    }
    .profile-img {
      width: 300px;
      height: 300px;
    }
    .hero-text h1 {
      font-size: 3.5rem;
    }
    .buttons {
      justify-content: center;
    }
    .contact-info {
      flex-direction: column;
      gap: 20px;
    }
  }
</style>
</head>
